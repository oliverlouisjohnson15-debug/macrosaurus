<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Page not found — Macrosaurus</title>
<meta name="robots" content="noindex">
<link rel="icon" href="/icon-192.png">
<meta name="theme-color" content="#5B4FA6">
<style>
:root{--bg:#F0F0F0;--ink:#1e1e1e;--text:#1a1a1a;--muted:#5f5f66;--purple:#5B4FA6;--gold:#F5C518;
  --pix:'Press Start 2P',ui-monospace,monospace;
  --mono:ui-monospace,"SFMono-Regular","SF Mono",Menlo,Consolas,"Courier New",monospace;}
*{box-sizing:border-box;}
html,body{margin:0;height:100%;background:var(--purple);}
body{font-family:var(--mono);color:var(--text);display:flex;align-items:center;justify-content:center;padding:24px;min-height:100vh;}
.card{background:#fff;border:3px solid var(--ink);box-shadow:6px 6px 0 var(--ink);max-width:440px;width:100%;text-align:center;padding:40px 30px;}
.dino{font-size:56px;line-height:1;}
.code{font-family:var(--pix);font-size:34px;color:var(--purple);margin:18px 0 0;}
h1{font-family:var(--pix);font-size:14px;line-height:1.6;margin:16px 0 0;color:var(--ink);}
p{color:var(--muted);font-size:14.5px;line-height:1.7;margin:16px 0 0;}
.btn{font-family:var(--pix);font-size:11px;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;
  gap:8px;padding:15px 20px;border:3px solid var(--ink);background:var(--gold);color:var(--ink);
  box-shadow:4px 4px 0 var(--ink);margin-top:26px;white-space:nowrap;}
.btn:active{transform:translate(4px,4px);box-shadow:0 0 0 0 var(--ink);}
.btn:focus-visible{outline:3px solid #2E6FD4;outline-offset:3px;}
</style>
</head>
<body>
<main class="card">
  <div class="dino" aria-hidden="true">&#129430;</div>
  <div class="code">404</div>
  <h1>This page went extinct.</h1>
  <p>The page you were after isn&rsquo;t here. It may have moved, or the link might be wrong.</p>
  <a class="btn" href="/">&#9654; BACK TO MACROSAURUS</a>
</main>
</body>
</html>
