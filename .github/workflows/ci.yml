name: CI

# Runs the test suite on every push and pull request to main.
# Ready to use once the repo is committed with git (tests/, package.json and app/*.js included).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run tests
        run: npm test
